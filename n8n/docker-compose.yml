services:
  n8n:
    image: n8nio/n8n:2.19.5
    container_name: n8n
    ports:
      - "0.0.0.0:5678:5678"
    environment:
      - N8N_HOST=n8n.bernzhomelab.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://n8n.bernzhomelab.com
      - N8N_OAUTH_CALLBACK_BASE_URL=https://n8n.bernzhomelab.com
      - WEBHOOK_URL=https://n8n.bernzhomelab.com
      - GENERIC_TIMEZONE=America/New_York
      - N8N_ENCRYPTION_KEY=7ec86cc70dac7474a65eb3812061e095e3bcb042133f8bcd1cdbef7d158ba602
      - N8N_SECURE_COOKIE=false
      - N8N_PROXY_HOPS=1
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
