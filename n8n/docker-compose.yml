services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "0.0.0.0:5678:5678"
    environment:
      - N8N_HOST=n8n.bernzhomelab.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://n8n.bernzhomelab.com
      - N8N_OAUTH_CALLBACK_BASE_URL=https://n8n.bernzhomelab.com
      - WEBHOOK_URL=https://n8n.bernzhomelab.com
      - GENERIC_TIMEZONE=America/New_York
      - N8N_ENCRYPTION_KEY=homelab2026secret
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data:
